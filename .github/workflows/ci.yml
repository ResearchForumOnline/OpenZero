name: OpenZero public checks

on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile public Python files
        run: |
          cd openzero
          python -m compileall brain hivemind openzero_doctor.py openzero_watchdog.py zero_core.py
